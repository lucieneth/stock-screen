name: Refresh screener data


on:
  schedule:
    # Every 2 hours during US market hours (9:30 AM–4:00 PM ET = 13:30–20:00 UTC), Mon–Fri
    - cron: "30 13 * * 1-5"  # 9:30 AM ET  — market open
    - cron: "30 15 * * 1-5"  # 11:30 AM ET
    - cron: "30 17 * * 1-5"  # 1:30 PM ET
    - cron: "30 19 * * 1-5"  # 3:30 PM ET  — ~30 min before close
  workflow_dispatch: {}       # allow manual "Run workflow"

# Needed so the job can commit the regenerated JSON back to the repo.
permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # safety net — a healthy run is a few minutes
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -u -m pipeline.run

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json docs/data/track_record.json docs/data/history/ cache/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh screener [skip ci]"
            git push origin HEAD:main
          fi
