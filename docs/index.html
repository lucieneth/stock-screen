<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Screener</title>
  <!-- Bump ?v= when app.js/styles.css change so browsers fetch the new file
       instead of a cached copy (GitHub Pages has no build step to hash names). -->
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <!--
    Served publicly by GitHub Pages. NEVER put API keys or secrets in this
    folder. This page only fetches and renders data/latest.json, which the
    pipeline produces in GitHub Actions.
  -->
  <header>
    <div class="title-row">
      <h1>Personal Stock Screener</h1>
      <span id="updated" class="updated"></span>
    </div>
    <p class="tagline">Decision-support dashboard — verdicts are a filter to investigate, not buy/sell instructions. Not financial advice.</p>
  </header>

  <section class="manage">
    <input id="manage-ticker" type="text" placeholder="Ticker, e.g. NFLX" aria-label="Ticker to add or remove" />
    <button id="add-btn" type="button">+ Add</button>
    <button id="remove-btn" type="button" class="secondary">– Remove</button>
    <span class="manage-hint">opens a GitHub issue; the Action updates the watchlist</span>
  </section>

  <section class="controls">
    <input id="search" type="search" placeholder="Filter by ticker…" aria-label="Filter by ticker" />
    <label>Verdict
      <select id="verdict-filter">
        <option value="ALL">All</option>
        <option value="WATCH-BUY">Watch-Buy</option>
        <option value="NEUTRAL">Neutral</option>
        <option value="WATCH-SELL">Watch-Sell</option>
      </select>
    </label>
    <label>Sort
      <select id="sort">
        <option value="composite-desc">Composite ↓</option>
        <option value="composite-asc">Composite ↑</option>
        <option value="symbol-asc">Ticker A–Z</option>
        <option value="change-desc">Day move ↓</option>
        <option value="change-asc">Day move ↑</option>
      </select>
    </label>
  </section>

  <main>
    <p id="status" class="placeholder">Loading…</p>
    <div id="cards" class="cards"></div>
  </main>

  <footer>
    <p>Refreshed on a schedule by GitHub Actions. Data source: Finnhub / FMP (computed locally).</p>
  </footer>

  <script src="app.js?v=4"></script>
</body>
</html>
