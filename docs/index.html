<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Screener</title>
  <!--
    Served publicly by GitHub Pages. NEVER put API keys or secrets in this
    folder. This page only fetches and renders data/*.json produced by the
    pipeline. Chart.js is vendored locally (vendor/) — no external calls.
    Bump ?v= when app.js/styles.css change so browsers skip the cached file.
  -->
  <link rel="preload" href="vendor/fonts/space-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="styles.css?v=13" />
</head>
<body>
  <div class="bg" aria-hidden="true"><div class="blob"></div></div>
  <div class="grain" aria-hidden="true"></div>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true"></span>
      <div>
        <h1>Stock&nbsp;Screener</h1>
        <p class="sub">decision-support · not financial advice</p>
      </div>
    </div>
    <div class="topbar-right">
      <span id="updated" class="updated"></span>
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle light/dark theme" title="Toggle theme">◐</button>
    </div>
  </header>

  <div id="tape" class="tape" hidden><div class="tape-track" id="tape-track"></div></div>

  <section id="brief" class="brief" hidden></section>

  <section id="hero" class="hero" hidden></section>

  <section id="changes" class="changes" hidden></section>

  <div class="toolbar">
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search ticker…" aria-label="Search ticker" />
    </div>
    <div id="verdict-pills" class="pills" role="group" aria-label="Filter by verdict">
      <button class="pill active" data-v="ALL">All</button>
      <button class="pill" data-v="WATCH-BUY">Buy</button>
      <button class="pill" data-v="NEUTRAL">Neutral</button>
      <button class="pill" data-v="WATCH-SELL">Sell</button>
    </div>
    <label class="sort-wrap">Sort
      <select id="sort">
        <option value="composite-desc">Composite ↓</option>
        <option value="composite-asc">Composite ↑</option>
        <option value="symbol-asc">Ticker A–Z</option>
        <option value="change-desc">Day move ↓</option>
        <option value="change-asc">Day move ↑</option>
        <option value="issues-first">Data issues first</option>
      </select>
    </label>
    <div class="manage">
      <input id="manage-ticker" type="text" placeholder="Ticker" aria-label="Ticker to add or remove" />
      <button id="add-btn" type="button" class="btn-accent">+ Add</button>
      <button id="remove-btn" type="button" class="btn-ghost">– Remove</button>
    </div>
  </div>

  <p id="gaps-note" class="gaps-note" hidden></p>
  <p id="status" class="status">Loading…</p>
  <main id="cards" class="cards"></main>

  <div id="scrim" class="scrim" hidden></div>
  <aside id="detail" class="drawer" hidden aria-label="Stock detail"></aside>

  <button id="chat-fab" class="chat-fab" aria-label="Ask the screener" title="Ask the screener">
    <span class="chat-fab-icon">✦</span></button>
  <section id="chat" class="chat" hidden aria-label="Screener assistant">
    <div class="chat-head">
      <div><strong>Screener Assistant</strong><span class="chat-sub">answers from today's data</span></div>
      <div class="chat-head-btns">
        <button id="chat-key" class="chat-mini" title="Add your own AI key for free-form chat">⚙</button>
        <button id="chat-close" class="chat-mini" aria-label="Close">✕</button>
      </div>
    </div>
    <div id="chat-log" class="chat-log"></div>
    <div id="chat-suggest" class="chat-suggest"></div>
    <form id="chat-form" class="chat-form">
      <input id="chat-input" type="text" autocomplete="off" placeholder="Ask: what's the best stock to buy?" aria-label="Ask a question" />
      <button class="chat-send" aria-label="Send">↑</button>
    </form>
  </section>

  <footer>
    <p>Refreshed on a schedule by GitHub Actions · data: Finnhub / Yahoo (computed locally). Verdicts are a filter to investigate, not buy/sell instructions.</p>
  </footer>

  <script src="vendor/chart.umd.min.js"></script>
  <script src="app.js?v=13"></script>
</body>
</html>
